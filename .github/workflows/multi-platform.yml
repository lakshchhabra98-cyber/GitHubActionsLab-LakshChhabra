name: Multi-Platform Testing

on:
  pull_request:
    branches:
      - main

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Print OS information
        run: echo "Running on Ubuntu Linux"
      - name: Show OS details
        run: uname -a
      - name: Create and display file
        run: |
          echo "Hello from Ubuntu" > info.txt
          cat info.txt
